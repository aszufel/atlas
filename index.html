function buildElements(view) {
  const els = [];
  const visibleNodeIds = new Set();

  nodes.forEach(n => {
    if (view === 'all' || n.v.includes(view)) {
      visibleNodeIds.add(n.id);
      els.push({ data: { id: n.id, label: n.label, type: n.type, desc: n.desc } });
    }
  });

  edges.forEach((e, i) => {
    if ((view === 'all' || e.v.includes(view)) && visibleNodeIds.has(e.source) && visibleNodeIds.has(e.target)) {
      els.push({ data: { id: 'e' + i, source: e.source, target: e.target, label: e.label } });
    }
  });

  return els;
}

function getLayout(view) {
  if (view === 'biznesy') {
    return cy.layout({
      name: 'breadthfirst',
      directed: true,
      roots: '#biz_peg',
      spacingFactor: 0.9,
      animate: false,
      padding: 50,
    });
  }
  if (view === 'zespol') {
    return cy.layout({ name: 'cose', animate: false, nodeRepulsion: 60000, idealEdgeLength: 100, edgeElasticity: 80, gravity: 0.5, numIter: 2000, padding: 40 });
  }
  return cy.layout({ name: 'cose', animate: false, nodeRepulsion: 80000, idealEdgeLength: 120, edgeElasticity: 100, gravity: 0.3, numIter: 1500, padding: 40 });
}

function showNodeDetails(node) {
  const d = node.data();
  const t = TYPES[d.type];
  const connected = node.connectedEdges().connectedNodes().filter(n => n.id() !== node.id());

  let connectionsHtml = '';
  if (connected.length > 0) {
    connectionsHtml = '<div class="connections"><h3>Polaczenia (' + connected.length + ')</h3>';
    connected.forEach(n => {
      const nt = TYPES[n.data('type')];
      connectionsHtml += `<div class="conn-item" data-id="${n.id()}"><img src="${ICON_BASE}/${nt.icon}.svg?color=${encodeURIComponent(nt.color)}" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"> ${n.data('label')} <span style="color:#484f58;font-size:11px">${nt.label}</span></div>`;
    });
    connectionsHtml += '</div>';
  }

  sidebar.innerHTML = `
    <h2>${d.label}</h2>
    <span class="node-type" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44"><img src="${ICON_BASE}/${t.icon}.svg?color=${encodeURIComponent(t.color)}" style="width:12px;height:12px;vertical-align:middle;margin-right:4px">${t.label}</span>
    <div class="detail"><div class="detail-label">Opis</div><div class="detail-value">${d.desc}</div></div>
    ${connectionsHtml}
  `;

  sidebar.querySelectorAll('.conn-item').forEach(el => {
    el.addEventListener('click', () => {
      const targetNode = cy.getElementById(el.dataset.id);
      highlightNode(targetNode);
      cy.animate({ center: { eles: targetNode }, zoom: 2 }, { duration: 300 });
    });
  });
}

function highlightNode(node) {
  cy.elements().removeClass('highlighted faded search-match');
  const neighborhood = node.closedNeighborhood();
  cy.elements().not(neighborhood).addClass('faded');
  neighborhood.addClass('highlighted');
  node.addClass('highlighted');
  showNodeDetails(node);
}

searchInput.addEventListener('input', function() {

  cy.elements().removeClass('search-match faded highlighted');
  if (!q) { sidebar.innerHTML = '<p class="empty">Kliknij node aby zobaczyc szczegoly</p>'; return; }

  const matches = cy.nodes().filter(n =>
    n.data('label').toLowerCase().includes(q) ||
    n.data('desc').toLowerCase().includes(q) ||
    n.data('type').toLowerCase().includes(q)
  );

  if (matches.length > 0) {
    cy.nodes().not(matches).addClass('faded');
    cy.edges().addClass('faded');
    matches.addClass('search-match');
    matches.connectedEdges().removeClass('faded');

    if (matches.length === 1) {
      highlightNode(matches[0]);
    } else {
      sidebar.innerHTML = `<h2>Wyniki (${matches.length})</h2>` +
        matches.map(n => {
          const nt = TYPES[n.data('type')];
          return `<div class="conn-item" data-id="${n.id()}"><img src="${ICON_BASE}/${nt.icon}.svg?color=${encodeURIComponent(nt.color)}" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"> ${n.data('label')}</div>`;

          cy.animate({ center: { eles: targetNode }, zoom: 2 }, { duration: 300 });
        });
      });
    }
  }
});

// === LEGEND (clickable — toggle type visibility) ===
const hiddenTypes = new Set();

function updateLegend(view) {
  hiddenTypes.clear();
  const visibleTypes = new Set();
  nodes.forEach(n => { if (view === 'all' || n.v.includes(view)) visibleTypes.add(n.type); });
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = Object.entries(TYPES)
    .filter(([k]) => visibleTypes.has(k))
    .map(([k, v]) => {
      const count = nodes.filter(n => n.type === k && (view === 'all' || n.v.includes(view))).length;
      return `<div class="legend-item" data-type="${k}" style="cursor:pointer"><div class="legend-dot" style="background:${v.color}"><img src="${ICON_BASE}/${v.icon}.svg?color=%23ffffff" alt=""></div>${v.label} (${count})</div>`;
    }).join('');

  legendEl.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.dataset.type;
      if (hiddenTypes.has(type)) {
        hiddenTypes.delete(type);
        el.style.opacity = '1';
      } else {
        hiddenTypes.add(type);
        el.style.opacity = '0.3';
      }
      // Apply filter
      cy.nodes().forEach(n => {
        if (hiddenTypes.has(n.data('type'))) {
          n.style('display', 'none');
        } else {
          n.style('display', 'element');
        }
      });
      cy.edges().forEach(e => {
        const srcHidden = hiddenTypes.has(cy.getElementById(e.data('source')).data('type'));
        const tgtHidden = hiddenTypes.has(cy.getElementById(e.data('target')).data('type'));
        e.style('display', (srcHidden || tgtHidden) ? 'none' : 'element');
      });
    });
  });
}

function updateStats(view) {
  const visNodes = nodes.filter(n => view === 'all' || n.v.includes(view));
  const visEdges = edges.filter(e => view === 'all' || e.v.includes(view));
  document.getElementById('stats').textContent =
    `${visNodes.length} nodes \u00B7 ${visEdges.length} edges \u00B7 Scroll = zoom \u00B7 Klik = detale \u00B7 / = szukaj \u00B7 Esc = reset`;
}

  }
}, 500);

// === KEYBOARD ===
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    cy.elements().removeClass('highlighted faded search-match');
    showWelcome(activeView);
    searchInput.value = '';
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
</body>
</html>
