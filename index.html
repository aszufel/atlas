<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — PEG Ecosystem</title>
<meta name="description" content="Interaktywna mapa ekosystemu Partner Expert GROUP — technologia, biznesy, zespół">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; height: 100vh; display: flex; flex-direction: column; }

.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
.logo { font-size: 18px; font-weight: 700; color: #58a6ff; letter-spacing: 1px; }
.views { display: flex; gap: 4px; }
.views button { padding: 6px 14px; border: 1px solid #30363d; background: transparent; color: #8b949e; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
.views button:hover { color: #e1e4e8; border-color: #58a6ff; }
.views button.active { background: #58a6ff; color: #fff; border-color: #58a6ff; }
.search-box { margin-left: auto; position: relative; }
.search-box input { padding: 6px 12px 6px 32px; background: #0d1117; border: 1px solid #30363d; color: #e1e4e8; border-radius: 6px; font-size: 13px; width: 220px; outline: none; }
.search-box input:focus { border-color: #58a6ff; }
.search-box::before { content: "\1F50D"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; }
.autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #161b22; border: 1px solid #30363d; border-radius: 6px; max-height: 280px; overflow-y: auto; z-index: 2000; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
.autocomplete-item { padding: 6px 10px; font-size: 12px; color: #e1e4e8; cursor: pointer; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #21262d; }
.autocomplete-item:hover, .autocomplete-item.active { background: #1f6feb22; }
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item .ac-type { font-size: 10px; color: #8b949e; margin-left: auto; }

.main { display: flex; flex: 1; overflow: hidden; }
#cy { flex: 1; }

.sidebar { width: 320px; background: #161b22; border-left: 1px solid #30363d; padding: 20px; overflow-y: auto; flex-shrink: 0; transition: width .2s ease; }
body.timeline-mode #cy { display: none !important; }
body.timeline-mode .sidebar { width: 100%; max-width: 900px; margin: 0 auto; padding: 32px 48px; border-left: none; }
body.timeline-mode .main { justify-content: center; }
body.timeline-mode .legend { display: none; }
.sidebar h2 { font-size: 16px; margin-bottom: 12px; color: #58a6ff; }
.sidebar .node-type { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
.sidebar .detail { margin-bottom: 8px; }
.sidebar .detail-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
.sidebar .detail-value { font-size: 14px; color: #e1e4e8; margin-top: 2px; }
.sidebar .connections { margin-top: 16px; }
.sidebar .connections h3 { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
.sidebar .conn-item { padding: 4px 0; font-size: 13px; color: #c9d1d9; cursor: pointer; }
.sidebar .conn-item:hover { color: #58a6ff; }
.sidebar .empty { color: #484f58; font-size: 13px; font-style: italic; }

.sidebar .welcome h2 { font-size: 16px; color: #58a6ff; margin-bottom: 8px; }
.sidebar .welcome p { font-size: 13px; color: #8b949e; line-height: 1.5; margin-bottom: 12px; }
.sidebar .welcome .shortcut { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; color: #8b949e; }
.sidebar .welcome .shortcut kbd { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #c9d1d9; font-family: monospace; }
.sidebar .welcome .view-desc { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.sidebar .welcome .view-desc h3 { font-size: 13px; color: #e1e4e8; margin-bottom: 4px; }
.sidebar .welcome .view-desc p { font-size: 12px; margin-bottom: 0; }
.sidebar .welcome .hint { font-size: 11px; color: #484f58; margin-top: 8px; border-top: 1px solid #21262d; padding-top: 8px; }

.tooltip { position: fixed; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #e1e4e8; pointer-events: none; z-index: 1000; max-width: 260px; box-shadow: 0 4px 12px rgba(0,0,0,.4); transition: opacity .15s; }
.tooltip .tt-label { font-weight: 600; margin-bottom: 2px; }
.tooltip .tt-type { font-size: 10px; color: #8b949e; }
.tooltip .tt-desc { font-size: 11px; color: #8b949e; margin-top: 4px; line-height: 1.4; }

.legend { display: flex; gap: 12px; padding: 8px 20px; background: #161b22; border-top: 1px solid #30363d; flex-wrap: wrap; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8b949e; cursor: pointer; transition: opacity .15s; user-select: none; }
.legend-item:hover { color: #e1e4e8; }
.legend-dot { width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.legend-dot img { width: 12px; height: 12px; filter: brightness(10); }

.stats { font-size: 12px; color: #484f58; padding: 8px 20px; background: #161b22; border-top: 1px solid #30363d; text-align: center; }

.back-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; margin-bottom: 12px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; cursor: pointer; transition: all .15s; }
.back-btn:hover { color: #e1e4e8; border-color: #58a6ff; }

.legend-toggle { display: none; padding: 6px 16px; background: #161b22; border-top: 1px solid #30363d; color: #8b949e; font-size: 12px; cursor: pointer; text-align: center; }
.legend-toggle:hover { color: #e1e4e8; }
.legend.collapsed { display: none; }

@media (max-width: 768px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; max-height: 40vh; border-left: none; border-top: 1px solid #30363d; }
  #cy { min-height: 50vh; }
  .topbar { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
  .search-box { margin-left: 0; width: 100%; }
  .search-box input { width: 100%; }

}

<body>

<div id="tooltip" class="tooltip" style="display:none"></div>

<div class="topbar">
  <div class="logo">ATLAS <span style="font-size:11px;font-weight:400;color:#8b949e;letter-spacing:0">— mapa ekosystemu PEG</span></div>
  <div class="views">
    <button class="active" data-view="cortex">Cortex</button>
    <button data-view="biznesy">Biznesy</button>
    <button data-view="zespol">Zesp&oacute;l</button>
    <button data-view="dataflow">Dataflow</button>
    <button data-view="timeline">Timeline</button>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Szukaj... ( / )" autocomplete="off">
    <div id="autocomplete" class="autocomplete-list" style="display:none"></div>
  </div>
  <button id="btn-orphans" title="Podświetl izolowane node'y (bez połączeń)" style="padding:6px 12px;background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:12px">🔦 Sieroty (<span id="orphans-count">0</span>)</button>
  <button id="btn-export" title="Zapisz jako PNG" style="padding:6px 12px;background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:12px">📷 PNG</button>
  <span id="updated-ts" style="font-size:11px;color:#484f58;margin-left:auto">updated: …</span>
</div>

<div class="main">
  <div id="cy"></div>
  <div class="sidebar" id="sidebar">
    <p class="empty">Kliknij node aby zobaczyć szczegóły</p>
  </div>
</div>

<div class="legend-toggle" id="legendToggle">▲ Legenda</div>
<div class="legend" id="legend"></div>
<div class="stats" id="stats"></div>

<script src="data.js"></script>
<script>
const ICON_BASE = 'https://api.iconify.design';
const TYPES = {
  script:   { label: 'Skrypt',     color: '#3fb950', shape: 'round-rectangle', icon: 'tabler/terminal-2' },
  api:      { label: 'API',        color: '#58a6ff', shape: 'round-rectangle', icon: 'tabler/cloud' },
  timer:    { label: 'Timer',      color: '#d29922', shape: 'round-rectangle', icon: 'tabler/clock' },
  cron:     { label: 'Cron PHP',   color: '#db6d28', shape: 'round-rectangle', icon: 'tabler/clock-play' },
  gcp:      { label: 'GCP',        color: '#4285f4', shape: 'round-rectangle', icon: 'simple-icons/googlecloud' },
  sched:    { label: 'Scheduler',  color: '#4285f4', shape: 'round-rectangle', icon: 'tabler/alarm' },
  secret:   { label: 'Secret',     color: '#6f42c1', shape: 'round-rectangle', icon: 'tabler/key' },
  bucket:   { label: 'Storage',    color: '#0ea5e9', shape: 'round-rectangle', icon: 'simple-icons/googlecloudstorage' },
  mcp:      { label: 'MCP',        color: '#bc8cff', shape: 'round-rectangle', icon: 'tabler/puzzle' },
  app:      { label: 'Aplikacja',  color: '#f778ba', shape: 'round-rectangle', icon: 'tabler/app-window' },
  repo:     { label: 'Repo',       color: '#8b949e', shape: 'round-rectangle', icon: 'tabler/git-branch' },
  core:     { label: 'Core file',  color: '#e3b341', shape: 'round-rectangle', icon: 'tabler/file-text' },
  persona:  { label: 'Persona',    color: '#f97583', shape: 'ellipse',         icon: 'tabler/robot' },
  automat:  { label: 'Automat',    color: '#d2a8ff', shape: 'round-rectangle', icon: 'tabler/clock-bolt' },
  hosting:  { label: 'Hosting',    color: '#56d364', shape: 'round-rectangle', icon: 'tabler/server' },
  holding:  { label: 'Holding',    color: '#f0e68c', shape: 'round-rectangle', icon: 'tabler/building-skyscraper' },
  spolka:   { label: 'Spółka',     color: '#ff7b72', shape: 'round-rectangle', icon: 'tabler/briefcase' },
  punkt:    { label: 'Punkt',      color: '#ffa657', shape: 'round-rectangle', icon: 'tabler/map-pin' },
  strategia:{ label: 'Strategia',  color: '#7ee787', shape: 'round-rectangle', icon: 'tabler/chess-knight' },
  pracownik:{ label: 'Pracownik',  color: '#79c0ff', shape: 'ellipse',         icon: 'tabler/user' },
  person_zarzad:    { label: 'Zarząd',      color: '#f0e68c', shape: 'ellipse', icon: 'tabler/crown' },
  person_management:{ label: 'Management',  color: '#f85149', shape: 'ellipse', icon: 'tabler/user-cog' },
  person_kierownicy:{ label: 'Kierownicy',  color: '#3fb950', shape: 'ellipse', icon: 'tabler/user-star' },
  person_specjalisci:{label: 'Specjaliści', color: '#d29922', shape: 'ellipse', icon: 'tabler/user-bolt' },
  person_pracownik_liniowy:{label:'Liniowy',color: '#79c0ff', shape: 'ellipse', icon: 'tabler/user' },
  group:    { label: 'Grupa',      color: '#21262d', shape: 'round-rectangle', icon: '' },
  layer:    { label: 'Warstwa',    color: '#21262d', shape: 'round-rectangle', icon: '' },
};

// === ACTIVE VIEW ===
let activeView = 'cortex';

// Dataflow view = kluczowe źródła danych + kto pisze/czyta
const DATAFLOW_NODES = new Set([
  // Stores
  'supabase', 'notion_api_firm', 'notion_api_priv', 'gcp_bq', 'gcp_bucket',
  'mikrus_pg', 'gmail_api', 'gdrive_api', 'apify', 'openai_api',
  // Apps (writers/readers)
  'app_pm', 'app_zakupex', 'app_janusz', 'app_bot_voice', 'app_muszla', 'app_atlas',
  // Cron writers (GCP Scheduler / Cloud Run Functions)
  'cr_notion_backup', 'cr_supabase_backup', 'cr_cloudflare_backup',
  'cr_content', 'cr_zakupex_import', 'cr_health_check',
  // Scripts readers/writers
  'update_context_py', 'system_audit_py', 'content_pipeline_py',
  'notion_py', 'gmail_py', 'fireflies_py', 'google_drive_backup_py',
]);

function isInView(n, view) {
  if (view === 'dataflow') return DATAFLOW_NODES.has(n.id);
  if (view === 'all') return true;
  return (n.v || []).includes(view);
}

function buildElements(view) {
  const els = [];
  const visibleNodeIds = new Set();

  // Add layer parent nodes (only in cortex view) z licznikiem
  const usedLayers = new Set();
  const layerCounts = {};
  nodes.forEach(n => {
    if (isInView(n, view)) {
      if (view === 'cortex' && nodeToLayer[n.id]) {
        usedLayers.add(nodeToLayer[n.id]);
        layerCounts[nodeToLayer[n.id]] = (layerCounts[nodeToLayer[n.id]]||0) + 1;
      }
    }
  });
  if (view === 'cortex') {
    layers.forEach(L => {
      if (usedLayers.has(L.id)) {
        visibleNodeIds.add(L.id);
        const lbl = `${L.label} (${layerCounts[L.id]||0})`;
        els.push({ data: { id: L.id, label: lbl, type: 'layer', desc: L.desc } });
      }
    });
  }

  nodes.forEach(n => {
    if (isInView(n, view)) {
      visibleNodeIds.add(n.id);
      const d = { id: n.id, label: n.label, type: n.type, desc: n.desc };
      if (view === 'cortex' && nodeToLayer[n.id]) d.parent = nodeToLayer[n.id];
      if (n.parent) d.parent = n.parent;  // zespol groups
      els.push({ data: d });
    }
  });

  edges.forEach((e, i) => {
    // Dataflow: wszystkie krawędzie między widocznymi nodami niezależnie od e.v (cross-view dataflow)
    const edgeInView = view === 'dataflow'
      ? (visibleNodeIds.has(e.source) && visibleNodeIds.has(e.target))
      : ((view === 'all' || (e.v || []).includes(view)) && visibleNodeIds.has(e.source) && visibleNodeIds.has(e.target));
    if (edgeInView) {
      els.push({ data: { id: 'e' + i, source: e.source, target: e.target, label: e.label } });
    }
  });

  return els;
}

// Node'y z backupem (badge w prawym dolnym rogu)
const BACKED_UP = new Set([
  // Archiwista → strych.mikr.us
  'env_file', 'mikrus_pg',
  // Git / GitHub
  'repo_cortex', 'repo_pm', 'repo_zakupex', 'repo_janusz',
  'repo_gustaw', 'repo_muszla', 'repo_voice',
  // Aplikacje — kod i deploy idą z git
  'app_pm', 'app_zakupex', 'app_janusz', 'app_gustaw',
  'app_bot_voice', 'app_atlas', 'app_muszla',
  // Hosting stron — deployowane z git przez FTP
  'dhosting',
]);

// HTML overlay container for backup badges (renderowane nad node'ami, poza ich bryłą)
const badgeLayer = document.createElement('div');
badgeLayer.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:5;';
document.getElementById('cy').style.position = 'relative';
document.getElementById('cy').appendChild(badgeLayer);

function applyBackupBadges() {
  badgeLayer.innerHTML = '';
  cy.nodes().forEach(node => {
    if (!BACKED_UP.has(node.id())) return;
    const pos = node.renderedPosition();
    const w = node.renderedWidth();
    const h = node.renderedHeight();
    const size = Math.max(14, Math.min(22, w * 0.35));
    // Prawy górny róg, nad node'em (offset ~60% promienia w prawo + w górę)
    const bx = pos.x + w/2 - size*0.3;
    const by = pos.y - h/2 - size*0.7;
    const badge = document.createElement('div');
    badge.style.cssText = `position:absolute; left:${bx}px; top:${by}px; width:${size}px; height:${size}px; background:#0f1117; border:1.5px solid #56d364; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(0,0,0,.5);`;
    badge.innerHTML = `<img src="${ICON_BASE}/tabler/cloud-check.svg?color=%2356d364" style="width:${size*0.6}px;height:${size*0.6}px">`;
    badge.title = 'Backup aktywny';
    badgeLayer.appendChild(badge);
  });
}

// Re-render badges po każdym ruchu/zoomie/drag
let badgeRaf = null;
function scheduleBadgeUpdate() {
  if (badgeRaf) return;
  badgeRaf = requestAnimationFrame(() => { badgeRaf = null; applyBackupBadges(); });
}

// === LAYOUTS ===
function getLayout(view) {
  if (view === 'biznesy') {
    return cy.layout({
      name: 'breadthfirst',
      directed: true,
      roots: '#biz_peg',
      spacingFactor: 0.9,
      animate: 'end',
      animationDuration: 400,
      padding: 50,
    });
  }
  if (view === 'zespol') {
    return cy.layout({
      name: 'fcose',
      animate: 'end',
      animationDuration: 400,
      quality: 'proof',
      randomize: true,
      nodeRepulsion: 10000,
      idealEdgeLength: 100,
      gravity: 0.3,
      gravityRangeCompound: 1.5,
      gravityCompound: 2.0,
      nestingFactor: 0.1,
      numIter: 3000,
      padding: 30,
      nodeSeparation: 40,
      tile: true,
      tilingPaddingVertical: 20,
      tilingPaddingHorizontal: 20,
      tilingCompareBy: (a, b) => {
        const order = ['person_zarzad','person_management','person_kierownicy','person_specjalisci','person_pracownik_liniowy'];
        const na = cy.getElementById(a).data('type');
        const nb = cy.getElementById(b).data('type');
        return order.indexOf(na) - order.indexOf(nb);
      },
      packComponents: true,
    });
  }
  return cy.layout({
    name: 'fcose',
    animate: 'end',
    animationDuration: 400,
    quality: 'proof',
    randomize: true,
    nodeRepulsion: 7000,
    idealEdgeLength: 110,
    edgeElasticity: 0.45,
    gravity: 0.25,
    gravityRangeCompound: 1.2,
    gravityCompound: 1.0,
    nestingFactor: 0.3,
    numIter: 2500,
    padding: 30,
    nodeSeparation: 60,
    tile: true,
    tilingPaddingVertical: 25,
    tilingPaddingHorizontal: 25,
    packComponents: true,
  });
}

// === CYTOSCAPE ===
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: buildElements('cortex'),
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'text-valign': 'bottom',
        'text-margin-y': 6,
        'font-size': 9,
        'font-family': '-apple-system, BlinkMacSystemFont, sans-serif',
        'color': '#c9d1d9',
        'text-outline-color': '#0f1117',
        'text-outline-width': 2,
        'text-wrap': 'wrap',
        'text-max-width': 90,
        'width': 32,
        'height': 32,
        'border-width': 1.5,
        'border-color': '#30363d',
      }
    },
    ...Object.entries(TYPES).map(([type, cfg]) => ({
      selector: `node[type="${type}"]`,
      style: {
        'background-color': cfg.color,
        'shape': cfg.shape,
        'border-color': cfg.color,
        'border-opacity': 0.4,
        'background-image': `${ICON_BASE}/${cfg.icon}.svg?color=%23ffffff`,
        'background-fit': 'contain',
        'background-clip': 'none',
        'background-width': '60%',
        'background-height': '60%',
        'background-image-opacity': 0.9,
      }
    })),
    // Brand icon overrides — prawdziwe logo serwisów
    ...(() => {
      const brandIcons = {
        // Vercel
        vercel: 'simple-icons/vercel',
        // Mikrus & servers
        laptop: 'tabler/device-laptop',
        strych: 'tabler/archive',
        // APIs — brands
        gmail_api: 'simple-icons/gmail',
        calendar_api: 'simple-icons/googlecalendar',
        notion_api_firm: 'simple-icons/notion',
        notion_api_priv: 'simple-icons/notion',
        cloudflare_api: 'simple-icons/cloudflare',
        openai_api: 'simple-icons/openai',
        gdrive_api: 'simple-icons/googledrive',
        supabase: 'simple-icons/supabase',
        apify: 'tabler/robot',
        gbp_api: 'simple-icons/google',
        fb_api: 'simple-icons/facebook',
        google_ads_api: 'simple-icons/googleads',
        google_admin_api: 'simple-icons/google',
        indexing_api: 'simple-icons/google',
        ga4_api: 'simple-icons/googleanalytics',
        gsc_api: 'simple-icons/googlesearchconsole',
        fireflies_api: 'tabler/microphone-2',
        psi_api: 'simple-icons/pagespeedinsights',
        mikrus_pg: 'simple-icons/postgresql',
        dhosting_ftp: 'tabler/file-upload',
        // Scripts that use brand
        cloudflare_py: 'simple-icons/cloudflare',
        google_ads_py: 'simple-icons/googleads',
        ga4_py: 'simple-icons/googleanalytics',
        search_console_py: 'simple-icons/googlesearchconsole',
        fireflies_py: 'tabler/microphone-2',
        notion_py: 'simple-icons/notion',
        notion_replace_py: 'simple-icons/notion',
        notion2email_py: 'simple-icons/notion',

const tooltipEl = document.getElementById('tooltip');
let tooltipTimeout = null;

cy.on('mouseover', 'node', function(e) {
  clearTimeout(tooltipTimeout);
  const node = e.target;
  if (node.data('type') !== 'group' && node.data('type') !== 'layer') node.addClass('hover');
  const d = node.data();
  const t = TYPES[d.type];
  const pos = e.renderedPosition;
  const backupBadge = BACKED_UP.has(d.id) ? `<div style="font-size:10px;color:#56d364;margin-top:2px"><img src="${ICON_BASE}/tabler/cloud-check.svg?color=%2356d364" style="width:11px;height:11px;vertical-align:middle;margin-right:3px">backup aktywny</div>` : '';
  tooltipEl.innerHTML = `<div class="tt-label">${d.label}</div><div class="tt-type" style="color:${t.color}"><img src="${ICON_BASE}/${t.icon}.svg?color=${encodeURIComponent(t.color)}" style="width:12px;height:12px;vertical-align:middle;margin-right:4px">${t.label}</div>${backupBadge}<div class="tt-desc">${d.desc}</div>`;
  tooltipEl.style.display = 'block';
  const cyRect = document.getElementById('cy').getBoundingClientRect();
  let tx = cyRect.left + pos.x + 20;
  let ty = cyRect.top + pos.y + 20;
  const tw = tooltipEl.offsetWidth;
  const th = tooltipEl.offsetHeight;
  if (tx + tw > window.innerWidth - 10) tx = window.innerWidth - tw - 10;
  if (ty + th > window.innerHeight - 10) ty = window.innerHeight - th - 10;
  if (tx < 10) tx = 10;
  if (ty < 10) ty = 10;
  tooltipEl.style.left = tx + 'px';
  tooltipEl.style.top = ty + 'px';
});
cy.on('mouseout', 'node', function(e) {
  e.target.removeClass('hover');
  tooltipTimeout = setTimeout(() => { tooltipEl.style.display = 'none'; }, 100);
});
cy.on('tap', 'node', function() { tooltipEl.style.display = 'none'; });
cy.on('pan zoom', function() { tooltipEl.style.display = 'none'; });

function showWelcome(view) {
  const info = VIEW_INFO[view];
  const visNodes = nodes.filter(n => n.v.includes(view));
  const visEdges = edges.filter(e => e.v.includes(view));
  const typeCounts = {};
  visNodes.forEach(n => {
    if (n.type === 'group' || n.type === 'layer') return;  // kontenery nie w statsach
    typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
  });
  const typeList = Object.entries(typeCounts).map(([k, v]) => `<span style="color:${TYPES[k].color}">\u25CF</span> ${TYPES[k].label}: ${v}`).join('<br>');

  // Suma kosztów dla widoku (tylko te z meta.cost)
  let costSection = '';
  if (typeof nodeMeta !== 'undefined') {
    const costsInView = visNodes
      .map(n => nodeMeta[n.id])
      .filter(m => m && typeof m.cost === 'number');
    if (costsInView.length > 0) {
      const total = costsInView.reduce((s, m) => s + m.cost, 0);
      const breakdown = costsInView
        .filter(m => m.cost > 0)
        .sort((a, b) => b.cost - a.cost)
        .slice(0, 5)
        .map((m, i) => {
          const node = visNodes.find(n => nodeMeta[n.id] === m);
          return `${node.label}: ${m.cost} zł`;
        }).join(' · ');
      costSection = `<div class="view-desc" style="border-color:#f0883e44"><h3 style="color:#f0883e">💰 Koszty znane</h3><p style="font-size:14px;color:#e1e4e8;margin-bottom:4px"><strong>~${total} zł/mc</strong> (${costsInView.length} pozycji)</p><p style="font-size:11px;color:#8b949e;margin:0">${breakdown}</p></div>`;
    }
  }

  sidebar.innerHTML = `
    <div class="welcome">
      <h2>${info.icon} ${info.title}</h2>
      <div class="view-desc">
        <p>${info.desc}</p>
      </div>
      ${costSection}
      <div class="detail"><div class="detail-label">Na mapie</div><div class="detail-value" style="font-size:12px;line-height:1.6">${typeList}</div></div>
      <div style="margin-top:12px">
        <div class="shortcut"><kbd>/</kbd> Szukaj</div>
        <div class="shortcut"><kbd>Klik</kbd> Detale node'a</div>
        <div class="shortcut"><kbd>Scroll</kbd> Zoom</div>
        <div class="shortcut"><kbd>Esc</kbd> Reset widoku</div>
        <div class="shortcut"><kbd>Legenda</kbd> Klik = filtruj typ</div>
      </div>
      <p class="hint">Najedź na node żeby zobaczyć opis. Kliknij żeby zobaczyć połączenia.</p>
    </div>
  `;
}

async function showTimeline() {
  sidebar.innerHTML = `<div class="welcome"><h2>\u23F3 Timeline</h2><div class="view-desc"><p>${VIEW_INFO.timeline.desc}</p></div><p class="empty">Ładuję commity z GitHub…</p></div>`;
  try {
    const res = await fetch('https://api.github.com/repos/aszufel/atlas/commits?per_page=30');
    if (!res.ok) throw new Error('GitHub API error ' + res.status);
    const commits = await res.json();
    const entries = commits.map(c => {
      const d = new Date(c.commit.author.date);
      const date = d.toISOString().slice(0, 10);
      const time = d.toISOString().slice(11, 16);
      const firstLine = c.commit.message.split('\n')[0];
      const body = c.commit.message.split('\n').slice(1).join('\n').trim();
      const sha = c.sha.slice(0, 7);
      const bodyHtml = body ? `<div style="font-size:11px;color:#8b949e;margin-top:4px;white-space:pre-wrap">${body.replace(/</g, '&lt;')}</div>` : '';
      return `<div style="padding:10px 0;border-bottom:1px solid #21262d">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
          <div style="font-size:11px;color:#58a6ff;font-family:monospace">${date} ${time}</div>
          <a href="${c.html_url}" target="_blank" style="font-size:10px;color:#484f58;font-family:monospace;text-decoration:none">${sha} \u2197</a>
        </div>
        <div style="font-size:13px;color:#e1e4e8;margin-top:4px">${firstLine.replace(/</g, '&lt;')}</div>
        ${bodyHtml}
      </div>`;
    }).join('');
    sidebar.innerHTML = `<div class="welcome"><h2>\u23F3 Timeline</h2><div class="view-desc"><p>${VIEW_INFO.timeline.desc}</p></div><div>${entries}</div></div>`;
  } catch (e) {
    sidebar.innerHTML = `<div class="welcome"><h2>\u23F3 Timeline</h2><p class="empty">B\u0142\u0105d: ${e.message}</p></div>`;
  }
}

    <button class="back-btn" id="backBtn">← Powrót</button>
    <h2>${d.label}${finalOpenBtn}</h2>
    <span class="node-type" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44"><img src="${ICON_BASE}/${t.icon}.svg?color=${encodeURIComponent(t.color)}" style="width:12px;height:12px;vertical-align:middle;margin-right:4px">${t.label}</span>
    ${sections.join('')}
    ${connectionsHtml}
  `;

  document.getElementById('backBtn').addEventListener('click', () => {
    cy.elements().removeClass('highlighted faded search-match');
    showWelcome(activeView);
  });

  sidebar.querySelectorAll('.conn-item').forEach(el => {
    el.addEventListener('click', () => {
      const targetNode = cy.getElementById(el.dataset.id);
      highlightNode(targetNode);
      cy.animate({ center: { eles: targetNode }, zoom: 2 }, { duration: 300 });
    });
  });
}

function highlightNode(node) {
  cy.elements().removeClass('highlighted faded search-match');
  const neighborhood = node.closedNeighborhood();
  cy.elements().not(neighborhood).addClass('faded');
  neighborhood.addClass('highlighted');
  node.addClass('highlighted');
  showNodeDetails(node);
}

cy.on('tap', 'node', function(e) { highlightNode(e.target); });
cy.on('tap', function(e) {
  if (e.target === cy) {
    cy.elements().removeClass('highlighted faded search-match show-label');
    showWelcome(activeView);
  }
});

// Edge hover — show label (only if label is non-empty)
cy.on('mouseover', 'edge', function(e) {
  const edge = e.target;
  edge.addClass('show-label');
  if (edge.data('label')) edge.style('label', edge.data('label'));
});
cy.on('mouseout', 'edge', function(e) {
  e.target.removeClass('show-label');
  e.target.style('label', '');
});

// === SEARCH z AUTOCOMPLETE ===
const searchInput = document.getElementById('search');
const acList = document.getElementById('autocomplete');
let acActive = -1;
let acMatches = [];

function hideAutocomplete() {
  acList.style.display = 'none';
  acActive = -1;
  acMatches = [];
}

function jumpToNode(nodeId) {
  const targetNode = cy.getElementById(nodeId);
  if (!targetNode || !targetNode.length) return;
  highlightNode(targetNode);
  cy.animate({ center: { eles: targetNode }, zoom: 2 }, { duration: 300 });
  hideAutocomplete();
}

function renderAutocomplete(q) {
  if (!q) { hideAutocomplete(); return; }
  acMatches = cy.nodes().filter(n => {
    if (n.data('type') === 'group' || n.data('type') === 'layer') return false;
    return n.data('label').toLowerCase().includes(q) ||
           (n.data('desc') || '').toLowerCase().includes(q) ||
           n.data('type').toLowerCase().includes(q);
  }).toArray().slice(0, 10);

  if (acMatches.length === 0) { hideAutocomplete(); return; }

  acList.innerHTML = acMatches.map((n, idx) => {
    const d = n.data();
    const t = TYPES[d.type];
    return `<div class="autocomplete-item${idx === acActive ? ' active' : ''}" data-id="${n.id()}" data-idx="${idx}"><img src="${ICON_BASE}/${t.icon}.svg?color=${encodeURIComponent(t.color)}" style="width:12px;height:12px"> ${d.label} <span class="ac-type">${t.label}</span></div>`;
  }).join('');
  acList.style.display = 'block';

  acList.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('mousedown', (e) => { e.preventDefault(); jumpToNode(el.dataset.id); searchInput.value = ''; });
  });
}

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  cy.elements().removeClass('search-match faded highlighted');
  if (!q) { hideAutocomplete(); showWelcome(activeView); return; }

  renderAutocomplete(q);

  const matches = cy.nodes().filter(n =>
    (n.data('type') !== 'group' && n.data('type') !== 'layer') &&
    (n.data('label').toLowerCase().includes(q) ||
     (n.data('desc') || '').toLowerCase().includes(q) ||
     n.data('type').toLowerCase().includes(q))
  );

  if (matches.length > 0) {
    cy.nodes().not(matches).addClass('faded');
    cy.edges().addClass('faded');
    matches.addClass('search-match');
    matches.connectedEdges().removeClass('faded');
  }
});

searchInput.addEventListener('keydown', function(e) {
  if (acMatches.length === 0) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActive = (acActive + 1) % acMatches.length;
    renderAutocomplete(this.value.toLowerCase().trim());
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActive = (acActive - 1 + acMatches.length) % acMatches.length;
    renderAutocomplete(this.value.toLowerCase().trim());
  } else if (e.key === 'Enter' && acActive >= 0) {
    e.preventDefault();
    jumpToNode(acMatches[acActive].id());
    this.value = '';
  } else if (e.key === 'Escape') {
    hideAutocomplete();
  }
});

searchInput.addEventListener('blur', () => setTimeout(hideAutocomplete, 150));

// === LEGEND (clickable — toggle type visibility) ===
const hiddenTypes = new Set();

function updateLegend(view) {
  hiddenTypes.clear();
  const visibleTypes = new Set();
  nodes.forEach(n => {
    if (n.type === 'group' || n.type === 'layer') return;  // kontenery nie w legendzie
    if (view === 'all' || n.v.includes(view)) visibleTypes.add(n.type);
  });
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = Object.entries(TYPES)
    .filter(([k]) => visibleTypes.has(k))
    .map(([k, v]) => {
      const count = nodes.filter(n => n.type === k && (view === 'all' || n.v.includes(view))).length;
      return `<div class="legend-item" data-type="${k}" style="cursor:pointer"><div class="legend-dot" style="background:${v.color}"><img src="${ICON_BASE}/${v.icon}.svg?color=%23ffffff" alt=""></div>${v.label} (${count})</div>`;
    }).join('');

  legendEl.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.dataset.type;
      if (hiddenTypes.has(type)) {
        hiddenTypes.delete(type);
        el.style.opacity = '1';
      } else {
        hiddenTypes.add(type);
        el.style.opacity = '0.3';
      }
      // Apply filter
      cy.nodes().forEach(n => {
        if (hiddenTypes.has(n.data('type'))) {
          n.style('display', 'none');
        } else {
          n.style('display', 'element');
        }
      });
      cy.edges().forEach(e => {
        const srcHidden = hiddenTypes.has(cy.getElementById(e.data('source')).data('type'));
        const tgtHidden = hiddenTypes.has(cy.getElementById(e.data('target')).data('type'));
        e.style('display', (srcHidden || tgtHidden) ? 'none' : 'element');
      });
    });
  });
}

function updateStats(view) {
  const visNodes = nodes.filter(n => view === 'all' || n.v.includes(view));
  const visEdges = edges.filter(e => view === 'all' || e.v.includes(view));
  document.getElementById('stats').textContent =
    `${visNodes.length} nodes \u00B7 ${visEdges.length} edges \u00B7 Scroll = zoom \u00B7 Klik = detale \u00B7 / = szukaj \u00B7 Esc = reset`;
}

updateLegend('cortex');
updateStats('cortex');

// Hub class — node'y z wieloma połączeniami wizualnie większe
function applyHubClass() {
  cy.nodes().not(':parent').forEach(n => {
    if (n.degree() > 8) n.addClass('hub');
    else n.removeClass('hub');
  });
}
applyHubClass();

// Sieroty — podświetl izolowane node'y
let orphansMode = false;
function getOrphans() {
  return cy.nodes().not(':parent').filter(n => n.degree() === 0 && n.data('type') !== 'layer' && n.data('type') !== 'group');
}
function updateOrphansCount() {
  document.getElementById('orphans-count').textContent = getOrphans().length;
}
function toggleOrphans() {
  orphansMode = !orphansMode;
  const btn = document.getElementById('btn-orphans');
  if (orphansMode) {
    const orphans = getOrphans();
    cy.nodes().not(':parent').addClass('faded');
    cy.edges().addClass('faded');
    orphans.removeClass('faded').addClass('orphan-highlight');
    btn.style.background = '#f85149';
    btn.style.color = '#fff';
    btn.style.borderColor = '#f85149';
    if (orphans.length > 0) cy.fit(orphans, 80);
  } else {
    cy.nodes().removeClass('faded').removeClass('orphan-highlight');
    cy.edges().removeClass('faded');
    btn.style.background = 'transparent';
    btn.style.color = '#8b949e';
    btn.style.borderColor = '#30363d';
    cy.fit(null, 40);
  }
}
document.getElementById('btn-orphans').addEventListener('click', toggleOrphans);
updateOrphansCount();

// Badge update na każdą zmianę viewport/pozycji
cy.on('pan zoom', scheduleBadgeUpdate);
cy.on('position', 'node', scheduleBadgeUpdate);
cy.on('layoutstop', scheduleBadgeUpdate);
cy.on('layoutstop', applyHubClass);
window.addEventListener('resize', scheduleBadgeUpdate);

// Auto-focus hub node on load
setTimeout(() => {
  applyBackupBadges();
  const hub = cy.getElementById('repo_cortex');
  if (hub.length) {
    cy.animate({ center: { eles: hub }, zoom: 1.2 }, { duration: 800, complete: scheduleBadgeUpdate });
  }
}, 500);

// === KEYBOARD ===
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    cy.elements().removeClass('highlighted faded search-match');
    showWelcome(activeView);
    searchInput.value = '';
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// === DEEP LINK (hash routing) ===
function applyHash() {
  const hash = location.hash.replace('#', '');
  if (['cortex', 'biznesy', 'zespol'].includes(hash) && hash !== activeView) {
    document.querySelector(`.views button[data-view="${hash}"]`).click();
  }
}
applyHash();
window.addEventListener('hashchange', applyHash);

// Update hash on view switch
document.querySelectorAll('.views button').forEach(btn => {
  btn.addEventListener('click', function() {
    history.replaceState(null, '', '#' + this.dataset.view);
  });
});

// === EXPORT PNG ===
document.getElementById('btn-export').addEventListener('click', () => {
  const png = cy.png({ full: true, scale: 2, bg: '#0f1117' });
  const a = document.createElement('a');
  a.href = png;
  a.download = `atlas-${activeView}-${new Date().toISOString().slice(0,10)}.png`;
  a.click();
});

// === LEGEND TOGGLE (mobile) ===
const legendToggle = document.getElementById('legendToggle');
const legendEl2 = document.getElementById('legend');
legendToggle.addEventListener('click', () => {
  legendEl2.classList.toggle('collapsed');
  legendToggle.textContent = legendEl2.classList.contains('collapsed') ? '▼ Legenda' : '▲ Legenda';
});

// === AUTO-UPDATE TIMESTAMP (z git log przez GitHub API) ===
(async function updateTimestamp() {
  try {
    const res = await fetch('https://api.github.com/repos/aszufel/atlas/commits?per_page=1');
    if (!res.ok) return;
    const commits = await res.json();
    if (!commits?.[0]?.commit?.author?.date) return;
    const d = new Date(commits[0].commit.author.date);
    const iso = d.toISOString().slice(0, 10);
    const hhmm = d.toISOString().slice(11, 16);
    document.getElementById('updated-ts').textContent = `updated: ${iso} ${hhmm} UTC`;
  } catch (e) {
    document.getElementById('updated-ts').textContent = '';
  }
})();

// === LIVE STATUS (fetchuje health-check state.json przez atlas-status Cloud Function) ===
const LIVE_STATUS_URL = 'https://europe-central2-ai-council-487609.cloudfunctions.net/atlas-status';
// Mapa nazw z health-check → node ID w atlasie
const LIVE_STATUS_MAP = {
  'PM app': 'app_pm',
  'ZakupEX': 'app_zakupex',
  'Janusz API': 'app_janusz',
  'IND.U WWW': null,   // brak 1:1 node (strona statyczna)
  'Sunday WWW': null,
  'PEG WWW': null,
  'Muszla WWW': 'app_muszla',
};
let liveStatusCache = null;

function renderLiveStatusBadges() {
  if (!liveStatusCache) return;
  // Usuń stare badges
  document.querySelectorAll('.live-badge').forEach(el => el.remove());
  if (activeView === 'timeline') return;

  Object.entries(liveStatusCache).forEach(([apiName, status]) => {
    const nodeId = LIVE_STATUS_MAP[apiName];
    if (!nodeId) return;
    const node = cy.getElementById(nodeId);
    if (!node || !node.length || !node.visible()) return;
    const bbox = node.renderedBoundingBox();
    const badge = document.createElement('div');
    badge.className = 'live-badge';
    const ok = status.ok === true;
    const color = ok ? '#3fb950' : '#f85149';
    badge.style.cssText = `position:absolute;left:${bbox.x2 - 14}px;top:${bbox.y1 + 2}px;width:10px;height:10px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};border:2px solid #0f1117;pointer-events:none;z-index:20;`;
    badge.title = `${apiName}: ${ok ? 'OK' : 'DOWN'} (HTTP ${status.code || '?'}, checked ${new Date(status.checked_at).toLocaleString('pl-PL')})`;
    badgeLayer.appendChild(badge);
  });
}

async function fetchLiveStatus() {
  try {
    const res = await fetch(LIVE_STATUS_URL, { cache: 'no-store' });
    if (!res.ok) return;
    liveStatusCache = await res.json();
    renderLiveStatusBadges();
  } catch (e) {
    console.warn('Live status fetch failed:', e);
  }
}

// Uruchom przy starcie + co 60s
fetchLiveStatus();
setInterval(fetchLiveStatus, 60000);
// Odśwież przy zmianach widoku/zoomu
cy.on('pan zoom', () => renderLiveStatusBadges());
</script>
